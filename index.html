<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>今日美国热点 - Today's Hot Topics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

        .platform-tag .dot {

        .platform-tag .dot.err { background: #e74c3c; }

        @keyframes pulse {

            margin-left: auto;

<div class="header-bar">
    <div class="container">
        <div class="header-top">
            <div class="brand">
                <h1>今日美国热点</h1>
                <div class="sub">Today's Hot Topics</div>
            </div>
            <div class="header-info">

                <div class="header-desc">综合美国各大平台热点，交叉验证后精选 TOP 5</div>
            </div>
        </div>
        <div class="toolbar" id="toolbar">
            <span class="platform-tag" data-src="reddit"><span class="dot"></span>Reddit</span>

                <span class="icon">&#x21bb;</span> 刷新
            </button>

</div>

<div class="container main">
    <div id="loadingSection" class="loading-section">

        <strong>交叉验证：</strong>从 Reddit、Hacker News、GitHub、主流新闻获取热点 →
        关键词提取 + 语义匹配 + 多源出现频率加权 → 跨平台共同关注的 TOP 5

<script>
// ========== Utilities ==========
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function formatNumber(n) {
    if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
    if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
    return String(n);
}
function getDateAgo(d) { const t=new Date(); t.setDate(t.getDate()-d); return t.toISOString().split('T')[0]; }
function dedupeByTitle(items) {
    const seen = new Set();
    return items.filter(it => {
        const k = it.title.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,50);
        if (seen.has(k)) return false;
        seen.add(k); return true;
    });
}

// Set header date
(function(){
    const now = new Date();
    const weeks = ['日','一','二','三','四','五','六'];
    document.getElementById('headerDate').textContent =
        `${now.getFullYear()} 年 ${now.getMonth()+1} 月 ${now.getDate()} 日 · 星期${weeks[now.getDay()]}`;
})();

// ========== Loading UI ==========
function setStepStatus(src, status) {
    // Loading step
    const step = document.querySelector(`.loading-step[data-src="${src}"]`);
    if (step) {
        step.classList.remove('active','done');
        const name = step.textContent.replace(/^[⬜⏳✅❌]\s*/,'');
        if (status==='loading') { step.classList.add('active'); step.textContent = '⏳ '+name; }
        else if (status==='done') { step.classList.add('done'); step.textContent = '✅ '+name; }
        else if (status==='error') { step.textContent = '❌ '+name; }
    }
    // Toolbar dot
    const tag = document.querySelector(`.platform-tag[data-src="${src}"] .dot`);
    if (tag) {
        tag.className = 'dot';
        if (status==='loading') tag.classList.add('loading');
        else if (status==='done') tag.classList.add('ok');
        else if (status==='error') tag.classList.add('err');
    }
}

// ========== Data Fetching ==========
async function fetchReddit() {
    setStepStatus('reddit','loading');
    try {
        const subs = ['popular','news','worldnews','technology'];
        const results = [];
        for (const sub of subs) {
            try {
                const r = await fetch(`https://www.reddit.com/r/${sub}/hot.json?limit=10&t=day`,
                    { headers:{'User-Agent':'TrendingHub/1.0'} });
                if (!r.ok) continue;
                const d = await r.json();
                d.data.children.forEach(c => results.push({
                    title: c.data.title, score: c.data.score,
                    comments: c.data.num_comments,
                    url: `https://reddit.com${c.data.permalink}`,
                    subreddit: c.data.subreddit
                }));
            } catch(e){}
        }
        const unique = dedupeByTitle(results);
        unique.sort((a,b)=>b.score-a.score);
        setStepStatus('reddit','done');
        return { source:'reddit', items: unique.slice(0,15) };
    } catch(e) {
        setStepStatus('reddit','error');
        return { source:'reddit', items:[], error:e.message };
    }
}

async function fetchHackerNews() {
    setStepStatus('hackernews','loading');
    try {
        const r = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
        const ids = await r.json();
        const stories = await Promise.all(
            ids.slice(0,20).map(id =>
                fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r=>r.json()).catch(()=>null)
            )
        );
        const items = stories.filter(s=>s&&s.title).map(s=>({
            title: s.title, score: s.score||0, comments: s.descendants||0,
            url: s.url || `https://news.ycombinator.com/item?id=${s.id}`
        }));
        setStepStatus('hackernews','done');
        return { source:'hackernews', items: items.slice(0,15) };
    } catch(e) {
        setStepStatus('hackernews','error');
        return { source:'hackernews', items:[], error:e.message };
    }
}

async function fetchGitHub() {
    setStepStatus('github','loading');
    try {
        const r = await fetch('https://api.github.com/search/repositories?q=created:>'+getDateAgo(7)+'&sort=stars&order=desc&per_page=20');
        if (!r.ok) throw new Error('GitHub API error');
        const d = await r.json();
        const items = d.items.filter(r=>r.stargazers_count<200000).map(r=>({
            title: `${r.full_name}: ${r.description||''}`.slice(0,120),
            score: r.stargazers_count, comments: r.open_issues_count,
            url: r.html_url, language: r.language
        }));
        setStepStatus('github','done');
        return { source:'github', items: items.slice(0,15) };
    } catch(e) {
        setStepStatus('github','error');
        return { source:'github', items:[], error:e.message };
    }
}

async function fetchNews() {
    setStepStatus('news','loading');
    try {
        const results = [];
        try {
            const r = await fetch('https://www.reddit.com/r/news+worldnews+politics/top.json?limit=15&t=day',
                { headers:{'User-Agent':'TrendingHub/1.0'} });
            if (r.ok) {
                const d = await r.json();
                d.data.children.forEach(c => {
                    if (c.data.domain && !c.data.domain.includes('reddit.com')) {
                        results.push({
                            title: c.data.title, score: c.data.score,
                            comments: c.data.num_comments,
                            url: c.data.url, domain: c.data.domain
                        });
                    }
                });
            }
        } catch(e){}
        setStepStatus('news', results.length>0?'done':'error');
        return { source:'news', items: results.slice(0,15) };
    } catch(e) {
        setStepStatus('news','error');
        return { source:'news', items:[], error:e.message };
    }
}

// ========== Cross-Validation ==========
function extractKeywords(title) {
    const stop = new Set([
        'the','a','an','is','are','was','were','be','been','being','have','has','had',
        'do','does','did','will','would','could','should','may','might','shall','can',
        'to','of','in','for','on','with','at','by','from','as','into','through','during',
        'before','after','above','below','between','out','off','over','under','again',
        'further','then','once','here','there','when','where','why','how','all','both',
        'each','few','more','most','other','some','such','no','nor','not','only','own',
        'same','so','than','too','very','just','about','up','it','its','he','she','they',
        'them','their','this','that','these','those','i','me','my','we','our','you','your',
        'what','which','who','whom','and','but','or','if','while','because','until','new',
        'says','said','also','like','get','got','one','two','first','back','now','even',
        'still','just','much','many','well','way','may','use','her','his','him','us',
        'vs','via','per','been','being','going','make','made','take','taken','know',
        'think','want','need','see','look','find','give','tell','come','go','say',
        'after','before','over','under','between','show','shows','year','years','people',
        'time','day','world','could','would','should','really','something','thing','every'
    ]);
    return title.toLowerCase().replace(/[^a-z0-9\s\-]/g,' ').split(/\s+/)
        .filter(w=>w.length>2 && !stop.has(w))
        .map(w=>w.replace(/^-+|-+$/g,'')).filter(w=>w.length>2);
}

function calcSimilarity(kw1, kw2) {
    if (!kw1.length || !kw2.length) return 0;
    const s1=new Set(kw1), s2=new Set(kw2);
    let m=0;
    for (const w of s1) {
        if (s2.has(w)) m++;
        for (const w2 of s2) {
            if (w!==w2 && (w.includes(w2)||w2.includes(w)) && Math.min(w.length,w2.length)>=3) m+=0.5;
        }
    }
    return m / Math.max(s1.size, s2.size);
}

function crossValidate(allSources) {
    const all = [];
    for (const src of allSources)
        for (const item of src.items)
            all.push({ ...item, source:src.source, keywords:extractKeywords(item.title) });

    const clusters=[], used=new Set();
    for (let i=0; i<all.length; i++) {
        if (used.has(i)) continue;
        const c = { items:[all[i]], sources:new Set([all[i].source]),
            keywords:new Set(all[i].keywords), totalScore:all[i].score||0 };
        used.add(i);
        for (let j=i+1; j<all.length; j++) {
            if (used.has(j)) continue;
            if (calcSimilarity([...c.keywords], all[j].keywords) >= 0.25) {
                c.items.push(all[j]); c.sources.add(all[j].source);
                all[j].keywords.forEach(k=>c.keywords.add(k));
                c.totalScore += all[j].score||0;
                used.add(j);
            }
        }
        clusters.push(c);
    }

    clusters.forEach(c => {
        const sc = c.sources.size;
        const avg = c.totalScore / c.items.length;
        const comm = c.items.reduce((s,it)=>s+(it.comments||0),0);
        c.finalScore = (sc**2)*1000 + avg + comm*0.5;
        c.sourceCount = sc;
        c.items.sort((a,b)=>(b.score||0)-(a.score||0));
        c.bestItem = c.items[0];
    });
    clusters.sort((a,b)=>b.finalScore-a.finalScore);
    return clusters.slice(0,5);
}

// ========== Category detection ==========
function detectCategory(keywords, title) {
    const t = (title+' '+keywords.join(' ')).toLowerCase();
    const cats = [
        { keys:['trump','biden','president','congress','senate','democrat','republican','election','vote','political','policy','white house','governor','legislation','impeach','campaign'], label:'政治' },
        { keys:['war','military','army','ukraine','russia','china','iran','missile','bomb','nato','attack','invasion','defense','weapon','troops','ceasefire','strike','nuclear'], label:'地缘政治 · 军事' },
        { keys:['ai','artificial','gpt','openai','llm','chatgpt','claude','gemini','machine learning','neural','deep learning','model','anthropic'], label:'人工智能' },
        { keys:['tech','apple','google','microsoft','amazon','meta','software','app','startup','silicon','chip','semiconductor','crypto','bitcoin','blockchain','computing'], label:'科技' },
        { keys:['stock','market','economy','inflation','fed','interest rate','gdp','trade','tariff','recession','bank','financial','wall street','dow','nasdaq','earnings'], label:'财经' },
        { keys:['nba','nfl','mlb','nhl','football','basketball','baseball','soccer','sport','game','player','team','coach','season','champion','playoff','match','espn','athlete'], label:'体育' },
        { keys:['movie','film','oscar','music','album','celebrity','entertainment','hollywood','netflix','disney','streaming','show','series','actor','singer','concert','award'], label:'娱乐' },
        { keys:['health','covid','virus','vaccine','disease','medical','hospital','drug','fda','cancer','treatment','mental','doctor','patient'], label:'健康' },
        { keys:['climate','environment','earthquake','hurricane','flood','fire','weather','tornado','storm','disaster','wildfire'], label:'自然 · 气候' },
        { keys:['space','nasa','spacex','rocket','mars','moon','satellite','orbit','launch','astronaut','telescope'], label:'太空' },
        { keys:['github','code','programming','developer','open source','framework','language','release','bug','api','library','repo'], label:'开源 · 开发' },
    ];
    let best = null, bestCount = 0;
    for (const cat of cats) {
        const count = cat.keys.filter(k => t.includes(k)).length;
        if (count > bestCount) { bestCount = count; best = cat.label; }
    }
    return best || '热门话题';
}

// ========== Rendering ==========
function renderTop5(clusters) {
    const section = document.getElementById('top5Section');
    const sourceLabels = {
        reddit:'Reddit', hackernews:'Hacker News', github:'GitHub', news:'News'
    };
    const sourceClasses = {
        reddit:'reddit', hackernews:'hackernews', github:'github', news:'news'
    };

    let html = '';
    clusters.forEach((cluster, idx) => {
        const item = cluster.bestItem;
        const cat = detectCategory([...cluster.keywords], item.title);
        const num = String(idx+1).padStart(2,'0');

        // Build summary
        let summary = '';
        if (cluster.sourceCount > 1) {
            summary = `该话题在 ${cluster.sourceCount} 个平台被同时关注，共 ${cluster.items.length} 条相关内容，总互动量达 ${formatNumber(cluster.totalScore)}。`;
        } else {
            summary = `热度评分 ${formatNumber(cluster.totalScore)}，${cluster.items[0].comments ? '评论 '+formatNumber(cluster.items[0].comments)+' 条。' : ''}`;
        }
        // Add other titles as context
        if (cluster.items.length > 1) {
            const others = cluster.items.slice(1,3).map(it => escapeHtml(it.title.slice(0,60))).join('；');
            summary += ` 相关：${others}`;
        }

        // Source links
        const links = [...cluster.sources].map(s => {
            const matchItem = cluster.items.find(it=>it.source===s);
            const url = matchItem ? matchItem.url : '#';
            return `<a href="${url}" target="_blank" rel="noopener" class="${sourceClasses[s]||''}">${sourceLabels[s]||s} →</a>`;
        }).join('');

        html += `
        <div class="top-card">
            <div class="card-rank-bg">${num}</div>
            <div class="card-body">
                <div class="card-category">${cat}</div>
                <div class="card-title">
                    <a href="${item.url}" target="_blank" rel="noopener">${escapeHtml(item.title)}</a>
                </div>
                <div class="card-summary">${summary}</div>
                <div class="card-sources">${links}</div>
            </div>
        </div>`;
    });

    section.innerHTML = html;
    section.style.display = 'block';
}

// ========== Main ==========
async function fetchAll() {
    const btn = document.querySelector('.refresh-btn');
    btn.classList.add('loading');
    document.getElementById('loadingSection').style.display = 'block';
    document.getElementById('top5Section').style.display = 'none';
    document.getElementById('algoNote').style.display = 'none';

    // Reset dots
    document.querySelectorAll('.platform-tag .dot').forEach(d => d.className='dot');
    document.querySelectorAll('.loading-step').forEach(el => {
        el.classList.remove('active','done');
        el.textContent = '⬜ ' + el.textContent.replace(/^[⬜⏳✅❌]\s*/,'');
    });

    try {
        const [reddit, hn, github, news] = await Promise.all([
            fetchReddit(), fetchHackerNews(), fetchGitHub(), fetchNews()
        ]);
        const allSources = [reddit, hn, github, news];
        const top5 = crossValidate(allSources);

        document.getElementById('loadingSection').style.display = 'none';
        renderTop5(top5);
        document.getElementById('algoNote').style.display = 'block';
    } catch(e) {
        document.getElementById('loadingSection').innerHTML =
            `<div style="color:#e74c3c;text-align:center;padding:40px;">获取数据失败: ${e.message}</div>`;
    }
    btn.classList.remove('loading');
}

fetchAll();
</script>
